name: Buildo bot - Lint, Test, Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.7.3 pytest pytest-asyncio
      - name: Ruff lint
        run: ruff check bot/ tests/
      - name: Ruff format check
        run: ruff format --check bot/ tests/
      - name: Pytest
        run: python -m pytest tests/ -v
        env:
          TELEGRAM_BOT_TOKEN: test_dummy
          ADMIN_TELEGRAM_ID: "6318513424"
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test_dummy
          SUPABASE_ANON_KEY: test_dummy
          OPENROUTER_API_KEY: test_dummy
          REDIS_URL: redis://localhost:***@v1
