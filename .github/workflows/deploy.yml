name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verify VPS target
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ "$VPS_HOST" != "108.165.164.85" ]; then
            echo "ERROR: VPS_HOST is '$VPS_HOST', expected 108.165.164.85"
            exit 1
          fi
          echo "VPS_HOST=$VPS_HOST OK"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
                    script: |
            REPO_NAME="buildo-bot"
            REPO_DIR="${{ secrets.VPS_DEPLOY_DIR }}/${REPO_NAME}"
            mkdir -p "$REPO_DIR"
            if [ ! -d "$REPO_DIR/.git" ]; then
              rm -rf "$REPO_DIR"
              git clone "https://github.com/shekelstrong/${REPO_NAME}.git" "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            docker compose down --remove-orphans || true
            docker compose up -d --build
            sleep 10
            docker compose ps
            docker image prune -f
            echo "DEPLOY OK at $(date -u)"
