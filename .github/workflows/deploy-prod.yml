name: Buildo bot - Deploy to production

on:
  workflow_run:
    workflows: ["Buildo bot - Lint, Test, Deploy"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy to 108.165.164.85
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          envs: TELEGRAM_BOT_TOKEN,ADMIN_TELEGRAM_ID,LLM_API_KEY,POSTGRES_PASSWORD,REDIS_PASSWORD,LAYERO_API_TOKEN,REGRU_API_LOGIN,REGRU_API_PASSWORD,OPENROUTER_API_KEY
          script: |
            set -e
            mkdir -p ~/Projects
            cd ~/Projects
            # If buildo-bot exists but is not a git repo (empty dir from bootstrap), remove it
            if [ -d buildo-bot ] && [ ! -d buildo-bot/.git ]; then
              echo "Removing stale empty buildo-bot dir"
              rm -rf buildo-bot
            fi
            if [ ! -d buildo-bot ]; then
              git clone https://github.com/shekelstrong/buildo-bot.git buildo-bot
            fi
            cd buildo-bot
            git pull origin main

            if [ -f ~/.buildo-bot.env ]; then
              echo "Using server-side env from ~/.buildo-bot.env"
              cp ~/.buildo-bot.env .env
            else
              echo "Generating .env from GH Secrets + random passwords"
              PG_PW="${POSTGRES_PASSWORD:-$(openssl rand -hex 16)}"
              RD_PW="${REDIS_PASSWORD:-$(openssl rand -hex 16)}"
              cat > .env <<ENVEOF
            TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
            ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID}
            LLM_API_KEY=${LLM_API_KEY}
            OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
            POSTGRES_PASSWORD=${PG_PW}
            REDIS_PASSWORD=${RD_PW}
            POSTGRES_DSN=postgresql://buildo:${PG_PW}@buildo-postgres:5432/buildo
            REDIS_URL=redis://:${RD_PW}@buildo-redis:6379/0
            LAYERO_API_TOKEN=${LAYERO_API_TOKEN}
            REGRU_API_LOGIN=${REGRU_API_LOGIN}
            REGRU_API_PASSWORD=${REGRU_API_PASSWORD}
            ENVIRONMENT=production
            LOG_LEVEL=INFO
            HEALTH_PORT=8080
            ENVEOF
            fi
            chmod 600 .env
            echo "wrote .env ($(wc -l < .env) lines)"

            docker compose pull || true
            docker compose up -d --build

            sleep 15
            echo "--- container status ---"
            docker compose ps
            echo "--- bot health ---"
            for i in 1 2 3 4 5; do
              if curl -fsS http://localhost:8080/health; then
                echo "BOT HEALTH OK (attempt $i)"
                break
              fi
              echo "waiting for bot (attempt $i/5)"
              sleep 5
            done

            echo "--- DB health ---"
            docker compose exec -T buildo-postgres pg_isready -U buildo -d buildo || echo "DB not ready yet"

            echo "--- apply schema (idempotent) ---"
            if [ -f db/schema.sql ]; then
              docker compose cp db/schema.sql buildo-postgres:/tmp/schema.sql
              docker compose exec -T buildo-postgres psql -U buildo -d buildo -f /tmp/schema.sql || echo "schema apply failed (check logs)"
            fi

            echo "--- recent logs ---"
            docker compose logs --tail=30 buildo-bot
