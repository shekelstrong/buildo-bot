name: Buildo bot - Deploy to production

on:
  workflow_run:
    workflows: ["Buildo bot - Lint, Test, Deploy"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy to 108.165.164.85
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            mkdir -p ~/Projects
            cd ~/Projects
            if [ ! -d buildo-bot ]; then
              git clone https://github.com/shekelstrong/buildo-bot.git buildo-bot
            fi
            cd buildo-bot
            git pull origin main

            # Build .env from GitHub Secrets at deploy time
            cat > .env <<ENVEOF
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            ADMIN_TELEGRAM_ID=${{ secrets.ADMIN_TELEGRAM_ID }}
            LLM_API_KEY=${{ secrets.LLM_API_KEY }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            REDIS_URL=redis://buildo-redis:6379/0
            LAYERO_API_TOKEN=${{ secrets.LAYERO_API_TOKEN }}
            REGRU_API_LOGIN=${{ secrets.REGRU_API_LOGIN }}
            REGRU_API_PASSWORD=${{ secrets.REGRU_API_PASSWORD }}
            BEGET_API_LOGIN=${{ secrets.BEGET_API_LOGIN }}
            BEGET_API_PASSWORD=${{ secrets.BEGET_API_PASSWORD }}
            YOOKASSA_SHOP_ID=${{ secrets.YOOKASSA_SHOP_ID }}
            YOOKASSA_SECRET_KEY=${{ secrets.YOOKASSA_SECRET_KEY }}
            CRYPTOBOT_API_TOKEN=${{ secrets.CRYPTOBOT_API_TOKEN }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            ENVIRONMENT=production
            LOG_LEVEL=INFO
            HEALTH_PORT=8080
            ENVEOF

            chmod 600 .env
            echo "wrote .env ($(wc -l < .env) lines)"

            # Start or restart via docker-compose
            docker compose up -d --build

            # Wait + health check
            sleep 10
            echo "--- container status ---"
            docker compose ps
            echo "--- health check ---"
            if curl -fsS http://localhost:8080/health; then
              echo "HEALTH OK"
            else
              echo "HEALTH FAILED - dumping logs:"
              docker compose logs --tail=100
              exit 1
            fi
