name: Buildo server - Bootstrap (fail2ban + ufw + postgres lockdown)

on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Bootstrap 108.165.164.85
    runs-on: ubuntu-latest
    steps:
      - name: Install + configure fail2ban + ufw
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            echo "=== Updating system ==="
            apt-get update -qq
            DEBIAN_FRONTEND=noninteractive apt-get upgrade -y -qq

            echo "=== Installing fail2ban + ufw + docker ==="
            DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
              fail2ban ufw curl ca-certificates

            # Docker (if not installed)
            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
              sh /tmp/get-docker.sh
              systemctl enable --now docker
            fi
            docker --version
            docker compose version

            echo "=== fail2ban: SSH + PostgreSQL protection ==="
            cat > /etc/fail2ban/jail.local <<'EOF2'
            [sshd]
            enabled = true
            port = ssh
            filter = sshd
            logpath = /var/log/auth.log
            maxretry = 5
            bantime = -1
            findtime = 600

            [postgresql]
            enabled = true
            port = 5432
            filter = postgresql
            logpath = /var/log/postgresql/postgresql-*-main.log
            maxretry = 5
            bantime = -1
            findtime = 600
            EOF2

            # Create postgresql filter if not exists
            cat > /etc/fail2ban/filter.d/postgresql.conf <<'EOF2'
            [Definition]
            failregex = ^.*FATAL:  password authentication failed for user.*$
                        ^.*FATAL:  no pg_hba.conf entry for host.*$
            ignoreregex =
            EOF2

            systemctl enable --now fail2ban
            systemctl restart fail2ban
            echo "fail2ban: 5 attempts -> permanent ban (SSH + PostgreSQL)"

            echo "=== ufw: only 22 (ssh) + 8080 (bot health) ==="
            ufw default deny incoming
            ufw default allow outgoing
            ufw allow ssh
            ufw allow 9090/tcp
            # 5432 NOT allowed from outside - only via Docker network
            ufw --force enable
            ufw status verbose

            echo "=== ~/Projects ready ==="
            mkdir -p ~/Projects
            echo "BOOTSTRAP COMPLETE"
