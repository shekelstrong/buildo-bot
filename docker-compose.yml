version: "3.9"

services:
  buildo-bot:
    build: .
    container_name: buildo-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    # Expose health on host port 9090 (8080 is taken by langnexus-bot on this host)
    # Public API for buildo-web and buildo-miniapp on 8888
    ports:
      - "9090:8080"
      - "8888:8888"
    networks:
      - buildo-net
    depends_on:
      buildo-postgres:
        condition: service_healthy
      buildo-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  buildo-redis:
    image: redis:7-alpine
    container_name: buildo-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?must be set}"]
    volumes:
      - redis-data:/data
    networks:
      - buildo-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  buildo-postgres:
    image: postgres:16-alpine
    container_name: buildo-postgres
    restart: unless-stopped
    # SECURITY: port 5432 is NOT exposed to host. Only accessible inside
    # the buildo-net Docker network. Bot connects via postgres://buildo:***@buildo-postgres:5432/buildo
    environment:
      POSTGRES_USER: buildo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set}
      POSTGRES_DB: buildo
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Schema applied once on first start, then sits as a record
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - buildo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildo -d buildo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  redis-data:
  postgres-data:

networks:
  buildo-net:
    driver: bridge
